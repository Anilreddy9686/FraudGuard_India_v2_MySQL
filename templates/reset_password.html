<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Reset Password — OPFD</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#060c16;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse 600px 400px at 30% 30%,rgba(255,153,51,.08) 0%,transparent 60%)}
.box{width:100%;max-width:420px;padding:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px}
h2{font-family:'Syne',sans-serif;color:#fff;font-size:22px;margin-bottom:6px;text-align:center}
.sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px;text-align:center}
.fg{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:5px}
.ii{position:relative}.ii i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:13px}
input{width:100%;padding:11px 12px 11px 36px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:#fff;font-size:13px;font-family:inherit;outline:none;transition:all .18s}
input:focus{border-color:#FF9933;background:rgba(255,153,51,.06)}
.btn{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#FF9933,#e67e00);color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit}
.alert{padding:10px 13px;border-radius:9px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px}
.a-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.rules{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}
</style></head>
<body><div class="box">
  <h2>🔑 Set New Password</h2>
  <div class="sub">Choose a strong password for your account.</div>
  {% with msgs=get_flashed_messages(with_categories=true) %}{% if msgs %}{% for c,m in msgs %}
  <div class="alert a-{{c}}"><i class="fas fa-info-circle"></i>{{m}}</div>
  {% endfor %}{% endif %}{% endwith %}
  <form method="POST">
    <div class="fg"><label>New Password</label><div class="ii"><i class="fas fa-lock"></i><input type="password" name="password" placeholder="Min 8 characters" required minlength="8"></div>
    <div class="rules">Must have: 8+ chars, 1 uppercase, 1 number</div></div>
    <div class="fg"><label>Confirm Password</label><div class="ii"><i class="fas fa-lock"></i><input type="password" name="confirm_password" required minlength="8"></div></div>
    <button type="submit" class="btn">Reset Password →</button>
  </form>
</div></body></html>
